<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - EchoMind AI+</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Background */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f0f1a;
      overflow: hidden;
    }

    /* Particle container */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Login box */
    .login-container {
      position: relative;
      z-index: 2;
      width: 380px;
      padding: 2.5rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.4);
      animation: popIn 1s ease;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      transform-style: preserve-3d;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .login-title {
      font-size: 1.9rem;
      font-weight: bold;
      color: #00eaff;
      text-align: center;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      text-shadow: 0 0 8px #00eaff;
    }

    /* Flash messages */
    .flash-messages {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }

    .flash-messages li {
      padding: 0.6rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #fff;
      animation: slideIn 0.6s ease;
    }

    .flash-messages li.success { background: rgba(40, 167, 69, 0.8); }
    .flash-messages li.error { background: rgba(220, 53, 69, 0.8); }
    .flash-messages li.warning { background: rgba(255, 193, 7, 0.8); }

    @keyframes slideIn {
      from {opacity: 0; transform: translateX(-20px);}
      to {opacity: 1; transform: translateX(0);}
    }

    /* Form fields */
    .form-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .form-group label {
      font-size: 0.9rem;
      color: #ddd;
      display: block;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s ease;
    }

    .form-group input:focus {
      border-color: #00eaff;
      box-shadow: 0 0 12px #00eaff;
    }

    /* Login button */
    .login-btn {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #00eaff, #6a11cb);
      color: #fff;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 234, 255, 0.8);
    }

    .login-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    /* Signup link */
    .signup-link {
      margin-top: 1.5rem;
      color: #ccc;
      text-align: center;
    }

    .signup-link a {
      color: #00eaff;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
    .forgot-link {
      margin-top: 1.5rem;
      color: #ccc;
      text-align: center;
    }

    .forgot-link a {
      color: #00eaff;
      text-decoration: none;
      font-weight: bold;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Particle Background -->
  <div class="particles"></div>

  <!-- Login Box -->
  <div class="login-container" id="loginCard">
    <h1 class="login-title">🔐 Login to EchoMind AI+</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-messages">
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="user_id">User ID</label>
        <input type="text" name="user_id" id="user_id" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
      </div>

      <button type="submit" class="login-btn">🚀 Login</button>
    </form>
    <p class="forgot-link">
    <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
    </p>
    <!-- </p> -->
    <p class="signup-link">
      Don’t have an account? <a href="{{ url_for('signup') }}">Sign up here</a>
    </p>
  </div>

  <!-- Particle Generator + Tilt Effect -->
  <script>
    // Generate floating particles
    const particlesContainer = document.querySelector('.particles');
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.animationDuration = (6 + Math.random() * 6) + 's';
      particle.style.width = particle.style.height = (2 + Math.random() * 6) + 'px';
      particlesContainer.appendChild(particle);
    }

    // 3D Tilt effect for login card
    const card = document.getElementById('loginCard');
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left; 
      const y = e.clientY - rect.top; 
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const rotateX = ((y - centerY) / centerY) * 10; // max 10deg
      const rotateY = ((x - centerX) / centerX) * 10;

      card.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
    });
  </script>
</body>
</html>
