<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - EchoMind AI+</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Background */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f1a;
      overflow: hidden;
      padding: 1rem;
      box-sizing: border-box;
    }

    /* Particle container */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Forgot container */
    .forgot-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(15px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.4);
      animation: popIn 1s ease;
      box-sizing: border-box;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .forgot-title {
      font-size: 1.7rem;
      font-weight: bold;
      color: #00eaff;
      text-align: center;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 8px #00eaff;
      letter-spacing: 1px;
    }

    /* Flash messages */
    .flash-messages {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }

    .flash-messages li {
      padding: 0.6rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #fff;
      animation: slideIn 0.6s ease;
    }

    .flash-messages li.success { background: rgba(40, 167, 69, 0.8); }
    .flash-messages li.error { background: rgba(220, 53, 69, 0.8); }
    .flash-messages li.warning { background: rgba(255, 193, 7, 0.8); }

    @keyframes slideIn {
      from {opacity: 0; transform: translateX(-20px);}
      to {opacity: 1; transform: translateX(0);}
    }

    /* Input */
    /* Align input and button horizontally */
.input-group {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 1rem;
}

/* Adjust input width inside group */
.input-group input {
  flex: 1;
  margin: 0;
}

/* Make buttons smaller to fit nicely */
.input-group button {
  flex-shrink: 0;
  width: auto;
  padding: 0.9rem 1.2rem;
  margin-top: 0;
}

    input[type="email"] {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 40px;
      border-radius: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s ease;
      background-image: url("https://cdn-icons-png.flaticon.com/512/561/561127.png");
      background-repeat: no-repeat;
      background-position: 12px center;
      background-size: 18px;
      box-sizing: border-box;
    }

    input[type="email"]:focus {
      border-color: #00eaff;
      box-shadow: 0 0 12px #00eaff;
    }
    input[type="otp"] {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 40px;
      border-radius: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s ease;
      background-image: url("https://cdn-icons-png.flaticon.com/512/61/61457.png");
      background-repeat: no-repeat;
      background-position: 12px center;
      background-size: 18px;
      box-sizing: border-box;
    }

    input[type="otp"]:focus {
      border-color: #00eaff;
      box-shadow: 0 0 12px #00eaff;
    }
    /* Password Inputs */
input[type="password"] {
  width: 100%;
  padding: 0.9rem 1rem 0.9rem 40px;
  border-radius: 12px;
  border: 1.5px solid rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  font-size: 1rem;
  outline: none;
  transition: 0.3s ease;
  background-image: url("https://cdn-icons-png.flaticon.com/512/61/61457.png");
  background-repeat: no-repeat;
  background-position: 12px center;
  background-size: 18px;
  box-sizing: border-box;
}

input[type="password"]:focus {
  border-color: #00eaff;
  box-shadow: 0 0 12px #00eaff;
}


    /* Button */
    button {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(90deg, #00eaff, #6a11cb);
      color: #fff;
      letter-spacing: 1px;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 234, 255, 0.8);
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    /* Link */
    .back-link {
      margin-top: 1.5rem;
      color: #ccc;
      text-align: center;
      font-size: 0.95rem;
    }

    .back-link a {
      color: #00eaff;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    /* Mobile optimization */
    @media (max-width: 420px) {
      .forgot-container {
        padding: 1.5rem;
        max-width: 90%;
      }
      .forgot-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Particle Background -->
  <div class="particles"></div>

  <!-- Forgot Password Box -->
  <div class="forgot-container" id="forgotCard">
    <h1 class="forgot-title">🔒 Forgot Password</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-messages">
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}


<form method="POST" action="{{ url_for('forgot_password') }}" class="input-group">
  <input type="email" name="email" placeholder="Enter your email" required value="{{ email or '' }}" {% if otp_sent or otp_verified %}readonly{% endif %}>
  <button type="submit">Send OTP</button>
</form>


{% if otp_sent %}
<form method="POST" action="{{ url_for('forgot_password') }}" class="input-group">
  <input type="hidden" name="email" value="{{ email }}">
  <input type="otp" name="otp" placeholder="Enter your OTP" required>
  <button type="submit">Verify OTP</button>
</form>
{% endif %}


{% if otp_verified %}
<form method="POST" action="{{ url_for('forgot_password') }}" class="input-group" style="flex-direction: column; gap: 0.8rem;">
  <input type="hidden" name="email" value="{{ email }}">
  <input type="password" name="new_pass" placeholder="Enter new password" required>
  <input type="password" name="cnfm_pass" placeholder="Confirm new password" required>
  <button type="submit">Reset Password</button>
</form>
{% endif %}




    <p class="back-link">
      🔙 <a href="{{ url_for('login') }}">Back to Login</a>
    </p>
  </div>

  <!-- Particle Generator + Tilt Effect -->
  <script>
    const particlesContainer = document.querySelector('.particles');
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.animationDuration = (6 + Math.random() * 6) + 's';
      particle.style.width = particle.style.height = (2 + Math.random() * 6) + 'px';
      particlesContainer.appendChild(particle);
    }

    const card = document.getElementById('forgotCard');
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const rotateX = ((y - centerY) / centerY) * 10;
      const rotateY = ((x - centerX) / centerX) * 10;
      card.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
    });
  </script>
</body>
</html>
